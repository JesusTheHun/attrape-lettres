  <circle cx="64" cy="27" r="12" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="1"/>
  <!-- fringe -->
  <path d="M53 24 Q56 15 64 15 Q72 15 75 24 Q64 19 53 24 Z" fill="url(#ju-hair)"/>
  <!-- face -->
  <circle cx="59.5" cy="27" r="1.4" fill="#6B7178"/>
  <circle cx="68.5" cy="27" r="1.4" fill="#6B7178"/>
  <path d="M60 32 Q64 35 68 32" fill="none" stroke="#6B7178" stroke-width="1.3" stroke-linecap="round"/>
