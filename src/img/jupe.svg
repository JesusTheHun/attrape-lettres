<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="jupe-t">
  <title id="jupe-t">Jupe</title>
  <defs>
    <linearGradient id="ju-skirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBA895"/>
      <stop offset="1" stop-color="#EF7A64"/>
    </linearGradient>
    <linearGradient id="ju-band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F08B76"/>
      <stop offset="1" stop-color="#DB6650"/>
    </linearGradient>
    <linearGradient id="ju-limb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CFD4D9"/>
      <stop offset="1" stop-color="#AFB5BC"/>
    </linearGradient>
    <linearGradient id="ju-shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BEC4CB"/>
      <stop offset="1" stop-color="#A2A9B1"/>
    </linearGradient>
    <linearGradient id="ju-hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A2A8AF"/>
      <stop offset="1" stop-color="#868C93"/>
    </linearGradient>
  </defs>
  <ellipse cx="64" cy="114" rx="27" ry="5" fill="#000000" fill-opacity="0.10"/>
  <!-- legs -->
  <path d="M56 70 L55 106 Q55 109 59 109 L61 109 Q63 109 63 106 L63 70 Z" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="1"/>
  <path d="M65 70 L65 106 Q65 109 67 109 L69 109 Q73 109 73 106 L72 70 Z" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="1"/>
  <!-- shoes -->
  <path d="M52 106 Q52 104 55 104 L63 104 L63 109 Q63 111 60 111 L54 111 Q52 111 52 109 Z" fill="#8B9198"/>
  <path d="M65 104 L73 104 Q76 104 76 106 L76 109 Q76 111 74 111 L68 111 Q65 111 65 109 Z" fill="#8B9198"/>
  <!-- torso / shirt -->
  <path d="M50 44 Q50 42 53 42 L75 42 Q78 42 78 44 L79 62 Q79 63 77 63 L51 63 Q49 63 49 62 Z" fill="url(#ju-shirt)" stroke="#9BA1A8" stroke-width="1"/>
  <!-- arms -->
  <path d="M50 45 Q45 47 44 53 L43 65 Q43 68 46 68 Q49 68 49 65 L50 54 Q50 48 52 46 Z" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="1"/>
  <path d="M78 45 Q83 47 84 53 L85 65 Q85 68 82 68 Q79 68 79 65 L78 54 Q78 48 76 46 Z" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="1"/>
  <circle cx="46" cy="68" r="3" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="0.8"/>
  <circle cx="82" cy="68" r="3" fill="url(#ju-limb)" stroke="#9BA1A8" stroke-width="0.8"/>
  <!-- SKIRT (the only colour) -->
  <path d="M52 64 L42 88 Q46 92 50 88 Q54 92 58 88 Q62 92 66 88 Q70 92 74 88 Q78 92 82 88 Q84 91 86 88 L76 64 Z" fill="url(#ju-skirt)" stroke="#D9604B" stroke-width="1.4"/>
  <g fill="none" stroke="#D9604B" stroke-width="1.4" stroke-opacity="0.4" stroke-linecap="round">
    <path d="M53 66 L44 88"/>
    <path d="M57 66 L50 88"/>
    <path d="M61 66 L58 88"/>
    <path d="M65 66 L66 88"/>
    <path d="M69 66 L74 88"/>
    <path d="M73 66 L84 88"/>
  </g>
  <path d="M52 60 Q52 58 55 58 L73 58 Q76 58 76 60 L76 64 L52 64 Z" fill="url(#ju-band)" stroke="#D9604B" stroke-width="1.4"/>
  <ellipse cx="56" cy="74" rx="7" ry="9" transform="rotate(6 56 74)" fill="#FFFFFF" fill-opacity="0.22"/>
  <!-- neck -->
  <rect x="60" y="35" width="8" height="8" rx="2" fill="url(#ju-limb)"/>
  <!-- hair back -->
  <path d="M64 13 C53 13 51 20 51 29 C51 34 52 37 54 39 L56 31 C56 23 59 19 64 19 C69 19 72 23 72 31 L74 39 C76 37 77 34 77 29 C77 20 75 13 64 13 Z" fill="url(#ju-hair)"/>
